<!doctype html>
<html lang="de" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MQTT Voice Control - Fixed</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body style="font-family:system-ui;padding:16px; direction: rtl; text-align: right; background-color: #f4f4f9;">

<h3 style="text-align: center; color: #333;">التحكم الصوتي (ألماني/عربي) - نسخة مصححة</h3>

<div style="background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border: 1px solid #ddd;">
    <label>رابط السيرفر (WSS)</label>
    <input id="ws" style="width:100%;padding:10px;margin-bottom:10px; direction: ltr;" value="wss://89d30411a3a74f3db35058e1999cb215.s1.eu.hivemq.cloud:8884/mqtt">

    <label>الموضوع (Topic)</label>
    <input id="topic" style="width:100%;padding:10px;margin-bottom:10px; direction: ltr;" value="PLC">

    <div style="display:flex; gap:10px;">
        <div style="flex:1">
            <label>Username</label>
            <input id="user" style="width:100%;padding:10px; direction: ltr;" value="mohamedkanel">
        </div>
        <div style="flex:1">
            <label>Password</label>
            <input id="pass" type="password" style="width:100%;padding:10px; direction: ltr;" value="WWEwwe123">
        </div>
    </div>
</div>

<div style="margin-top:20px;display:flex;gap:10px;flex-wrap:wrap; justify-content: center;">
  <button id="connect" style="padding:12px 20px;font-size:18px; cursor:pointer; background:#2ecc71; color:white; border:none; border-radius:5px;">🔌 اتصال (Verbinden)</button>
  <button id="startBtn" disabled style="padding:12px 20px;font-size:18px;">START</button>
  <button id="stopBtn" disabled style="padding:12px 20px;font-size:18px;">STOP</button>
</div>

<div style="margin-top:15px; text-align: center;">
  <button id="rec" disabled style="padding:18px 30px;font-size:20px; border-radius:50px; cursor:pointer; background:#3498db; color:white; border:none; box-shadow: 0 4px 15px rgba(52,152,219,0.3);">🎤 تحدث بالألمانية أو العربية</button>
</div>

<pre id="log" style="background:#2c3e50; color:#ecf0f1; padding:15px; border-radius:10px; margin-top:20px; white-space:pre-wrap; min-height: 120px; direction: ltr; text-align: left; font-size: 13px; overflow-y: auto;"></pre>

<script>
let client = null;

const logEl = document.getElementById("log");
const wsEl = document.getElementById("ws");
const topicEl = document.getElementById("topic");
const userEl = document.getElementById("user");
const passEl = document.getElementById("pass");

function log(s){ 
  const time = new Date().toLocaleTimeString();
  logEl.textContent += `[${time}] ${s}\n`; 
  logEl.scrollTop = logEl.scrollHeight; 
}

function setEnabled(on){
  document.getElementById("startBtn").disabled = !on;
  document.getElementById("stopBtn").disabled  = !on;
  document.getElementById("rec").disabled      = !on;
}

document.getElementById("connect").onclick = () => {
  if (client) { client.end(); log("Reconnecting..."); }
  
  const url = wsEl.value.trim();
  log("Attempting to connect to HiveMQ...");

  // التصحيح الأساسي هنا: إضافة protocol و path و استخدام الـ URL بشكل صحيح
  client = mqtt.connect(url, {
    username: userEl.value,
    password: passEl.value,
    protocol: 'wss', // إجبار البروتوكول الآمن
    path: '/mqtt',   // المسار المطلوب لـ HiveMQ Cloud
    clientId: 'web_' + Math.random().toString(16).substr(2, 8),
    connectTimeout: 10000,
    reconnectPeriod: 1000,
  });

  client.on("connect", () => { 
    log("Connected ✅ (Verbunden)"); 
    setEnabled(true); 
    document.getElementById("connect").style.background = "#27ae60";
  });

  client.on("error", (err) => {
    log("Error: " + err.message);
    console.error(err);
  });

  client.on("close", () => log("Connection Closed"));
};

function publish(msg){
  if(!client || !client.connected) { log("Error: Not connected"); return; }
  const t = topicEl.value.trim();
  client.publish(t, msg, { qos: 0 }, (err) => {
    if(err) log("Publish Error: " + err.message);
    else log("Sent: " + msg);
  });
}

document.getElementById("startBtn").onclick = () => publish("START");
document.getElementById("stopBtn").onclick  = () => publish("STOP");

// نظام التعرف على الصوت
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SpeechRecognition){
  const rec = new SpeechRecognition();
  rec.lang = "de-DE"; // اللغة الألمانية كافتراضية
  rec.interimResults = false;

  rec.onresult = (e) => {
    const text = e.results[0][0].transcript.toLowerCase();
    log("Gehört: " + text);

    if (/(start|starten|los|ابدأ|تشغيل)/i.test(text)) publish("START");
    else if (/(stopp|stop|anhalten|ايقاف|وقف)/i.test(text)) publish("STOP");
    else log("Command not recognized");
  };

  document.getElementById("rec").onclick = () => {
    log("Listening...");
    rec.start();
  };
} else {
  log("Speech recognition not supported in this browser");
}
</script>
</body>
</html>
